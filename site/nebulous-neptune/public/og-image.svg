<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circle top right -->
  <circle cx="1100" cy="100" r="300" fill="#2563EB" opacity="0.06"/>
  <circle cx="1050" cy="150" r="180" fill="#2563EB" opacity="0.06"/>

  <!-- Decorative circle bottom left -->
  <circle cx="100" cy="550" r="200" fill="#10B981" opacity="0.05"/>

  <!-- Blue accent bar left -->
  <rect x="80" y="180" width="5" height="260" rx="3" fill="url(#accent)"/>

  <!-- Domain label -->
  <text x="110" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#3b82f6" letter-spacing="2">KI-KURS-VERGLEICH.DE</text>

  <!-- Main headline -->
  <text x="110" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#f8fafc">KI-Kurse</text>
  <text x="110" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#f8fafc">vergleichen</text>

  <!-- Subline -->
  <text x="110" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">Von kostenlos bis intensiv — mit Förderbarkeit auf einen Blick.</text>

  <!-- Tags -->
  <!-- Tag 1 -->
  <rect x="110" y="490" width="185" height="44" rx="22" fill="#2563EB" opacity="0.2"/>
  <text x="203" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#60a5fa" text-anchor="middle">✅ AZAV-förderbar</text>

  <!-- Tag 2 -->
  <rect x="310" y="490" width="155" height="44" rx="22" fill="#10B981" opacity="0.2"/>
  <text x="388" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#34d399" text-anchor="middle">🎓 10 Kurse</text>

  <!-- Tag 3 -->
  <rect x="480" y="490" width="195" height="44" rx="22" fill="#2563EB" opacity="0.2"/>
  <text x="578" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#60a5fa" text-anchor="middle">🇩🇪 Deutschland</text>

  <!-- Right side illustration: course cards -->
  <g transform="translate(780, 160)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="340" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="20" y="20" width="4" height="50" rx="2" fill="#2563EB"/>
    <text x="40" y="42" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">Elements of AI — IHK</text>
    <text x="40" y="64" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Kostenlos · IHK-Zertifikat</text>
    <rect x="248" y="28" width="72" height="26" rx="13" fill="#10B981" opacity="0.2"/>
    <text x="284" y="46" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle">Kostenlos</text>

    <!-- Card 2 -->
    <rect x="0" y="106" width="340" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="20" y="126" width="4" height="50" rx="2" fill="#2563EB"/>
    <text x="40" y="148" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">KI-Manager — SkillSprinters</text>
    <text x="40" y="170" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">4 Monate · IHK + DEKRA</text>
    <rect x="234" y="134" width="86" height="26" rx="13" fill="#2563EB" opacity="0.2"/>
    <text x="277" y="152" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">✅ Förderbar</text>

    <!-- Card 3 -->
    <rect x="0" y="212" width="340" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="20" y="232" width="4" height="50" rx="2" fill="#2563EB"/>
    <text x="40" y="254" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">Certified AI Pro — XDi</text>
    <text x="40" y="276" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">2 Tage · AZAV-zertifiziert</text>
    <rect x="234" y="240" width="86" height="26" rx="13" fill="#2563EB" opacity="0.2"/>
    <text x="277" y="258" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">✅ Förderbar</text>

    <!-- Card 4 faded -->
    <rect x="0" y="318" width="340" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" opacity="0.5"/>
    <rect x="20" y="338" width="4" height="50" rx="2" fill="#2563EB" opacity="0.5"/>
    <text x="40" y="360" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9" opacity="0.5">Haufe Akademie KI-Manager</text>
    <text x="40" y="382" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" opacity="0.5">2–3 Tage · IHK-Zertifikat</text>
  </g>
</svg>
